<button (click)="export()">Export!</button>
<br><br>
@if (errorMessages.length > 0) {
	Errors:
	<div class="subpanel">
		@for (msg of errorMessages; track $index) {
			{{msg}}
		}
	</div>
}
@if (warningMessages.length > 0) {
	Warnings:
	<div class="subpanel">
		@for (msg of warningMessages; track $index) {
			{{msg}}
		}
	</div>
}

@if (exported.length > 0){
	Export: <br>
	<textarea [value]="exported"></textarea>
}
